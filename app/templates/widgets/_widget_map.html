<article class="widget-card" data-widget-id="{{ widget.id }}">
    <div class="widget-header">
        <div class="widget-header-left">
            <span class="widget-badge map-badge">Carte</span>
            <div>
                <h3>{{ widget.title }}</h3>
                <p>{{ widget.description or "Aucune description renseignée." }}</p>
            </div>
        </div>

        <div class="widget-header-right">
            <button class="icon-action-btn">Filtrer</button>
            <button class="icon-action-btn open-widget-modal">Paramétrer</button>
            <form method="post" action="/dashboard/{{ dashboard.id }}/widgets/{{ widget.id }}/delete">
                <button type="submit" class="icon-action-btn danger-btn">Supprimer</button>
            </form>
        </div>
    </div>

    <div class="widget-tools">
        <div class="widget-search">
            <input type="text" placeholder="Rechercher dans ce widget..." />
        </div>
        <div class="widget-meta">
            <span>Type : Carte</span>
            <span>Source ID : {{ widget.source_id }}</span>
            <span>Rafraîchissement : {{ widget.refresh_frequency or "Manuel" }}</span>
        </div>
    </div>

    <div class="widget-body">
        <div class="map-preview">
            <div class="map-shape"></div>
            <span class="map-dot dot-1"></span>
            <span class="map-dot dot-2"></span>
            <span class="map-dot dot-3"></span>
            <span class="map-dot dot-4"></span>
        </div>
    </div>
</article>
